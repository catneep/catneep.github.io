<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>havila.dev</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/switch.css">
  <link rel="stylesheet" href="css/shine.css">
  <link rel="stylesheet" href="css/overlay.css">

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
  <script src="js/template.js"></script>
  <script>
    function overlayOn(){
      const ov = document.getElementById('overlay');
      ov.style.display = "block";
    }

    function overlayOff(){
      const ov = document.getElementById('overlay');
      ov.style.display = "none";
    }

    function displayProjects(){
      const ov = document.getElementById('projects-overlay');
      ov.classList.remove('hidden');
      ov.classList.add('shown');
      if (!drawn){
        drawTemplates();
      }
    }

    function hideProjects(){
      const ov = document.getElementById('projects-overlay');
      ov.classList.remove('shown');
      ov.classList.add('hidden');
    }
  </script>
</head>
<body>
  <div class="is-vector" id="scene">
    <img
      src="img/webBgBot.svg"
      alt="Background Vector A"
      width="1920"
      height="1080"
      data-depth="0.8"
    />
    <img
      src="img/webBgMid.svg"
      alt="Background Vector B"
      width="1920"
      height="1080"
      data-depth="0.4"
    />
    <img
      src="img/webBgTop.svg"
      alt="Background Vector C"
      width="1920"
      height="1080"
      data-depth="0.3"
    />
  </div>

  <div id="main">
    <div id="options">
      <label class="switch" id="toggleDark" title="Toggle Dark Mode">
        <input type="checkbox">
        <span class="slider round"></span>
      </label>
    </div>

    <div id="quotes">
      <p class="has-shadow">
        <q><i id="quoteContent">
          Don't overthink it.
        </i></q>
      </p>
      <p class="has-right-text">
        <b id="quoteAuthor">
          - Julian Casablancas
        </b>
      </p>
    </div>

    <div id="title">
      <h1 class="is-shiny">
        h<span class="is-closer">av</span>ila.dev
      </h1>
    </div>

    <div id="menu">
      <ul class="has-shadow">
        <li class="is-enabled" onclick="displayProjects()">
          <a>Projects</a>
        </li>
        <li class="is-disabled">
          <a href="#">About</a>
        </li>
        <li class="is-enabled" onclick="overlayOn()">
          <a>Contact</a>
        </li>
      </ul>
    </div>
  </div>

  <div id="overlay" onclick="overlayOff()">
    <div id="text">
      <p>
        For business inquiries:
        <a id="mail" target="_blank" href="mailto:contact@havila.dev?subject=Hey!&body=Let's%20work%20together!">
          <span>&lt;</span>contact@havila.dev<span>/&gt;</span>
        </a>
      </p>
    </div>
  </div>

  <div id="projects-overlay" class="hidden">
    <div class="is-flex">
      <h1>
        Projects
      </h1>
      <button onclick="hideProjects()">
        X
      </button>
    </div>
    <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
    <div id="projects">
      <div id="project-list"></div>
      <hr/>
      <div id="project-info">
        Project Info goes here
      </div>
    </div>
  </div>

  <template id="project-card-template">
    <div class="project-card">
      <div class="project-card-bg"></div>
      <h3></h3>
    </div>
  </template>

  <script src="js/darkToggle.js"></script>
  <script src="js/quotes.js"></script>
  <!-- <script>
    let scene = document.getElementById('scene');
    let parallaxInstance = new Parallax(scene);
  </script> -->

</body>
</html>
